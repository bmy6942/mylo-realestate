<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>房源詳情 | 麥落不動產</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0d1b2a;
      --navy2: #1b2d42;
      --gold: #c9a84c;
      --gold-light: #e8c87a;
      --white: #ffffff;
      --gray: #f5f5f5;
      --text: #333;
      --text-light: #777;
      --border: #e5e7eb;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; color: var(--text); background: var(--gray); }

    /* NAV */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 999;
      background: rgba(13,27,42,0.96); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px; height: 70px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer; }
    .nav-logo-icon {
      width: 40px; height: 40px; background: var(--gold);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: var(--navy);
    }
    .nav-logo-text { color: var(--white); font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .nav-logo-text span { color: var(--gold); }
    .nav-back { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px; cursor: pointer; }
    .nav-back:hover { color: var(--gold); }

    /* CONTAINER */
    .container { max-width: 1200px; margin: 0 auto; padding: 100px 40px 60px; }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 400px; font-size: 18px; color: var(--text-light);
    }

    /* GALLERY */
    .gallery {
      display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 60px;
    }
    .gallery-main {
      width: 100%; aspect-ratio: 4/3;
      background: var(--white); border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); cursor: zoom-in;
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumbs {
      display: flex; flex-direction: column; gap: 10px;
    }
    .gallery-thumb {
      width: 100%; height: 100px; background: var(--white);
      border-radius: 8px; overflow: hidden; cursor: pointer;
      border: 2px solid transparent; transition: border 0.3s;
    }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb.active { border-color: var(--gold); }
    .gallery-thumb:hover { border-color: var(--gold); }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      position: relative; width: 90%; max-width: 1000px;
      max-height: 85vh; display: flex; align-items: center; justify-content: center;
    }
    .lightbox-content img { max-width: 100%; max-height: 85vh; object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 20px; right: 30px;
      background: none; border: none; color: var(--white);
      font-size: 32px; cursor: pointer;
    }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.3); border: none; color: white;
      width: 50px; height: 50px; border-radius: 50%;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.3s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.5); }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }

    /* DETAILS */
    .details { background: var(--white); border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .detail-header { margin-bottom: 30px; }
    .detail-title { font-size: 32px; font-weight: 900; color: var(--navy); margin-bottom: 12px; }
    .detail-location { font-size: 16px; color: var(--text-light); display: flex; gap: 8px; margin-bottom: 16px; }
    .detail-price {
      font-size: 28px; font-weight: 900; color: var(--gold);
      border-bottom: 2px solid var(--gold); padding-bottom: 12px;
    }

    /* GRID */
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
    .detail-item {
      padding: 20px; background: var(--gray); border-radius: 8px;
      border-left: 4px solid var(--gold);
    }
    .detail-item-label { font-size: 12px; text-transform: uppercase; color: var(--text-light); letter-spacing: 1px; margin-bottom: 8px; }
    .detail-item-value { font-size: 18px; font-weight: 700; color: var(--navy); }

    /* DESCRIPTION */
    .detail-description { margin: 30px 0; padding: 20px; background: var(--gray); border-radius: 8px; line-height: 1.8; }
    .detail-description h3 { margin-bottom: 12px; color: var(--navy); }

    /* VIDEO */
    .detail-video { margin: 30px 0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .detail-video iframe { width: 100%; height: 500px; border: none; }

    /* CONTACT */
    .contact-section {
      background: var(--navy); color: var(--white); border-radius: 12px;
      padding: 40px; margin: 60px 0; text-align: center;
    }
    .contact-section h3 { font-size: 24px; font-weight: 900; margin-bottom: 30px; }
    .contact-methods { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .contact-method {
      padding: 20px; background: rgba(255,255,255,0.1); border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .contact-method-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.8; }
    .contact-method-value {
      font-size: 16px; font-weight: 700;
      text-decoration: none; color: var(--gold);
    }
    .contact-method a { color: var(--gold); text-decoration: none; transition: color 0.3s; }
    .contact-method a:hover { color: var(--gold-light); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .container { padding: 80px 20px 40px; }
      .gallery { grid-template-columns: 1fr; }
      .gallery-thumbs { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .gallery-thumb { height: 80px; }
      .detail-title { font-size: 24px; }
      .detail-price { font-size: 22px; }
      .contact-section { padding: 20px; }
      .detail-video iframe { height: 300px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo" onclick="window.location.href='index.html'">
      <div class="nav-logo-icon">M</div>
      <div class="nav-logo-text">麥<span>落</span></div>
    </div>
    <a class="nav-back" onclick="window.location.href='index.html'">← 返回房源列表</a>
  </nav>

  <div class="container">
    <div id="loading" class="loading">載入中...</div>
    <div id="content" style="display: none;">

      <!-- GALLERY -->
      <div class="gallery">
        <div class="gallery-main">
          <img id="main-image" src="" alt="property" />
        </div>
        <div class="gallery-thumbs" id="gallery-thumbs"></div>
      </div>

      <!-- DETAILS -->
      <div class="details">
        <div class="detail-header">
          <div class="detail-title" id="prop-title"></div>
          <div class="detail-location">📍 <span id="prop-location"></span></div>
          <div class="detail-price" id="prop-price"></div>
        </div>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-item-label">坪數</div>
            <div class="detail-item-value" id="prop-area">-</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">格局</div>
            <div class="detail-item-value" id="prop-rooms">-</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">樓層</div>
            <div class="detail-item-value" id="prop-floor">-</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">類型</div>
            <div class="detail-item-value" id="prop-type">-</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">狀態</div>
            <div class="detail-item-value" id="prop-status">-</div>
          </div>
        </div>

        <div id="description-section" style="display: none;">
          <div class="detail-description">
            <h3>房源說明</h3>
            <p id="prop-description"></p>
          </div>
        </div>

        <div id="video-section" style="display: none;">
          <div class="detail-video" id="video-container"></div>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="contact-section">
        <h3>立即聯絡我們</h3>
        <div class="contact-methods">
          <div class="contact-method">
            <div class="contact-method-label">電話</div>
            <a class="contact-method-value" href="tel:0228570717">(02) 2857-0717</a>
          </div>
          <div class="contact-method">
            <div class="contact-method-label">信箱</div>
            <a class="contact-method-value" href="mailto:mylovetribe@gmail.com">mylovetribe@gmail.com</a>
          </div>
          <div class="contact-method">
            <div class="contact-method-label">LINE</div>
            <a class="contact-method-value" href="https://line.me/R/ti/p/@mylovetribe" target="_blank">@mylovetribe</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="property" />
    </div>
    <button class="lightbox-nav prev" onclick="lightboxPrev()">‹</button>
    <button class="lightbox-nav next" onclick="lightboxNext()">›</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase config
    const SUPABASE_URL = 'https://ehvbuzxixaxwphlrszuw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVodmJ1enhpeGF4d3BobHJzenV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjgxMjcsImV4cCI6MjA4OTk0NDEyN30.2XJiHQFurNoXlZ0LWJTsVZOYVI7RF1XhVeXMvX-E4aM';
    const STORAGE_URL_BASE = 'https://ehvbuzxixaxwphlrszuw.supabase.co/storage/v1/object/public/property-photos';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentProperty = null;
    let photos = [];
    let currentPhotoIndex = 0;

    async function loadProperty() {
      try {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
          document.getElementById('loading').textContent = '房源ID不存在';
          return;
        }

        const { data, error } = await sb
          .from('properties')
          .select('*, property_photos(*)')
          .eq('id', parseInt(id))
          .single();

        if (error || !data) {
          document.getElementById('loading').textContent = '房源不存在';
          return;
        }

        currentProperty = data;
        renderProperty();
      } catch (error) {
        document.getElementById('loading').textContent = '載入失敗: ' + error.message;
      }
    }

    function renderProperty() {
      if (!currentProperty) return;

      // Basic info
      document.getElementById('prop-title').textContent = currentProperty.title;
      document.getElementById('prop-location').textContent = currentProperty.location;
      document.getElementById('prop-price').textContent = `NT$ ${parseInt(currentProperty.price).toLocaleString()} / 月`;
      document.getElementById('prop-area').textContent = currentProperty.area || '-';
      document.getElementById('prop-rooms').textContent = currentProperty.rooms || '-';
      document.getElementById('prop-floor').textContent = currentProperty.floor || '-';
      document.getElementById('prop-type').textContent = currentProperty.type || '-';
      const statusEl = document.getElementById('prop-status');
      const statusText = currentProperty.status || '-';
      statusEl.textContent = statusText;
      statusEl.style.cssText = statusText === '出租中'
        ? 'color:#b8860b;font-weight:700'
        : statusText === '空置'
        ? 'color:#4CAF50;font-weight:700'
        : '';

      // Description
      if (currentProperty.note) {
        document.getElementById('prop-description').textContent = currentProperty.note;
        document.getElementById('description-section').style.display = 'block';
      }

      // Photos
      photos = (currentProperty.property_photos || []).map(p => ({
        id: p.id,
        url: `${STORAGE_URL_BASE}/${p.storage_path}`
      }));

      if (photos.length > 0) {
        renderGallery();
      }

      // Video
      if (currentProperty.video) {
        const embedUrl = getYouTubeEmbedUrl(currentProperty.video);
        if (embedUrl) {
          const container = document.getElementById('video-container');
          container.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
          document.getElementById('video-section').style.display = 'block';
        }
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    function renderGallery() {
      if (photos.length === 0) return;

      // Main image
      currentPhotoIndex = 0;
      document.getElementById('main-image').src = photos[0].url;
      document.getElementById('main-image').onclick = () => openLightbox();

      // Thumbnails
      const thumbsContainer = document.getElementById('gallery-thumbs');
      thumbsContainer.innerHTML = photos.map((photo, idx) => `
        <div class="gallery-thumb ${idx === 0 ? 'active' : ''}" onclick="selectPhoto(${idx})">
          <img src="${photo.url}" alt="photo" />
        </div>
      `).join('');
    }

    function selectPhoto(idx) {
      currentPhotoIndex = idx;
      document.getElementById('main-image').src = photos[idx].url;
      document.querySelectorAll('.gallery-thumb').forEach((th, i) => {
        th.classList.toggle('active', i === idx);
      });
    }

    function openLightbox() {
      document.getElementById('lightbox').classList.add('open');
      document.getElementById('lightbox-img').src = photos[currentPhotoIndex].url;
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function lightboxNext() {
      currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentPhotoIndex].url;
    }

    function lightboxPrev() {
      currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentPhotoIndex].url;
    }

    function getYouTubeEmbedUrl(url) {
      if (!url) return null;
      let videoId = null;

      // youtube.com/watch?v=ID
      if (url.includes('youtube.com/watch')) {
        const match = url.match(/v=([^&]+)/);
        if (match) videoId = match[1];
      }
      // youtu.be/ID
      else if (url.includes('youtu.be/')) {
        const match = url.match(/youtu\.be\/([^?]+)/);
        if (match) videoId = match[1];
      }
      // Already embed URL
      else if (url.includes('youtube.com/embed/')) {
        return url;
      }

      return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lightboxNext();
      if (e.key === 'ArrowLeft') lightboxPrev();
    });

    // Close lightbox on background click
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLightbox();
    });

    // Load on page load
    window.addEventListener('load', loadProperty);
  </script>
</body>
</html>
